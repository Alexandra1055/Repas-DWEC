name: "diw-vue"

services:
  node-diw:
    image: node:24
    user: "${UID}:${GID}"
    tty: true
    stdin_open: true
    working_dir: /app
    volumes:
      - ./vue:/app
    ports:
      - "8085:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"